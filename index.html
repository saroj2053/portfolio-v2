<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saroj Sah: Portfolio Site</title>
    <link rel="icon" type="image/svg+xml" href="/portfolio-favicon.svg" />
    <meta name="description" content="Personal portfolio of Saroj Sah, a Full-Stack Developer specializing in modern web applications, UI/UX, and scalable systems." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <script>
      (function() {
        var skin = localStorage.getItem("skin");
        if (skin) {
          document.documentElement.setAttribute("data-skin", skin);
          if (skin === "desert-night" || skin === "ocean" || skin === "midnight" || skin === "coinbase" || skin === "discord") {
            document.documentElement.classList.add("dark");
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
